<rect class="bg" width="1600" height="900"/><rect class="top" width="1600" height="58"/><text x="28" y="37" class="title">自动供件与单件分离 HMI｜整体信息架构</text><text x="650" y="36" class="t">运行中 ｜ PLC 在线 ｜ 相机 6/6 ｜ 光电正常 ｜ Docker 运行中 ｜ 操作员</text>
